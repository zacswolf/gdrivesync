name: Deploy Pages Site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare site config
        run: |
          cat > site/public/site-config.js <<'EOF'
          window.GDRIVESYNC_SITE_CONFIG = {
            googleWebClientId: "532481685126-mulp97i1h0v0i20im0mhgilt4em8f15b.apps.googleusercontent.com",
            googleApiKey: "${{ secrets.GDRIVESYNC_PICKER_API_KEY }}",
            googleProjectNumber: "532481685126"
          };
          EOF

      - name: Deploy static site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4.76.0"
          command: pages deploy site/public --project-name=gdrivesync --commit-dirty=true
