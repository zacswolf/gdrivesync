<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Connecting GDriveSync</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(145deg, #f8f5ea 0%, #edf5ef 100%);
        color: #1d231d;
      }

      main {
        width: min(92vw, 34rem);
        padding: 2rem;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 45px rgba(17, 26, 19, 0.08);
      }

      code {
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Finishing sign-in…</h1>
      <p id="message">Sending Google’s response back to VS Code.</p>
    </main>
    <script>
      function decodeBase64UrlJson(value) {
        const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4, "=");
        return JSON.parse(atob(padded));
      }

      function forwardToExtension() {
        const params = new URLSearchParams(window.location.search);
        const state = params.get("state");
        if (!state) {
          document.getElementById("message").textContent = "Missing OAuth state. You can return to VS Code and try again.";
          return;
        }

        try {
          const decoded = decodeBase64UrlJson(state);
          const redirectUrl = new URL(decoded.localRedirect);
          params.forEach((value, key) => redirectUrl.searchParams.set(key, value));
          window.location.replace(redirectUrl.toString());
        } catch (error) {
          document.getElementById("message").textContent =
            "Could not decode the OAuth state. You can return to VS Code and try again.";
          console.error(error);
        }
      }

      forwardToExtension();
    </script>
  </body>
</html>
