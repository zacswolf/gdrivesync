<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Google Picker</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(35, 96, 58, 0.2), transparent 30%),
          linear-gradient(160deg, #f8f4ec 0%, #eef4ef 100%);
        color: #18221a;
      }

      main {
        width: min(94vw, 36rem);
        padding: 2rem;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 56px rgba(14, 24, 16, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      p {
        line-height: 1.6;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 999px;
        background: #1f6d43;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        margin-top: 1rem;
        padding: 0.85rem 1.2rem;
      }

      button[disabled] {
        cursor: wait;
        opacity: 0.7;
      }

      code {
        word-break: break-word;
      }

      .note {
        padding: 0.85rem 1rem;
        border-radius: 14px;
        background: #eef5ef;
        color: #245439;
      }
    </style>
    <script src="/site-config.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script async defer src="https://apis.google.com/js/api.js"></script>
  </head>
  <body>
    <main>
      <h1 id="heading">Select a Google file</h1>
      <p id="status">Preparing the Google Picker flow…</p>
      <p id="hint" class="note" hidden></p>
      <button id="continue" type="button" hidden>Continue with Google</button>
    </main>
    <script>
      const DRIVE_READONLY_SCOPE = "https://www.googleapis.com/auth/drive.readonly";

      function decodeBase64UrlJson(value) {
        const base64 = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = base64.padEnd(Math.ceil(base64.length / 4) * 4, "=");
        return JSON.parse(atob(padded));
      }

      function getElements() {
        return {
          heading: document.getElementById("heading"),
          status: document.getElementById("status"),
          hint: document.getElementById("hint"),
          continueButton: document.getElementById("continue")
        };
      }

      function setStatus(message) {
        getElements().status.textContent = message;
      }

      function setHint(message) {
        const { hint } = getElements();
        hint.hidden = !message;
        hint.textContent = message || "";
      }

      function setHeading(message) {
        getElements().heading.textContent = message;
      }

      function setContinueButtonState({ hidden, disabled, label, onClick }) {
        const { continueButton } = getElements();
        continueButton.hidden = hidden;
        continueButton.disabled = disabled;
        continueButton.textContent = label;
        continueButton.onclick = onClick || null;
      }

      function parseRequest() {
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const rawRequest = hashParams.get("request");
        if (!rawRequest) {
          throw new Error("Missing picker request payload.");
        }

        return {
          rawRequest,
          payload: decodeBase64UrlJson(rawRequest)
        };
      }

      function validateSiteConfig() {
        const config = window.GDOCSYNC_SITE_CONFIG || {};
        const missingValues = [];
        if (!config.googleWebClientId || config.googleWebClientId.includes("REPLACE_")) {
          missingValues.push("googleWebClientId");
        }
        if (!config.googleApiKey || config.googleApiKey.includes("REPLACE_")) {
          missingValues.push("googleApiKey");
        }
        if (!config.googleProjectNumber || String(config.googleProjectNumber).includes("REPLACE_")) {
          missingValues.push("googleProjectNumber");
        }
        if (missingValues.length > 0) {
          throw new Error(`Hosted picker is not configured yet. Missing: ${missingValues.join(", ")}`);
        }

        return config;
      }

      function completeSelection(request, selection) {
        const redirectUrl = new URL(request.payload.localRedirect);
        redirectUrl.searchParams.set("state", request.rawRequest);
        redirectUrl.searchParams.set("fileId", selection.fileId);
        redirectUrl.searchParams.set("title", selection.title);
        redirectUrl.searchParams.set("sourceUrl", selection.sourceUrl);
        redirectUrl.searchParams.set("sourceMimeType", selection.sourceMimeType);
        if (selection.resourceKey) {
          redirectUrl.searchParams.set("resourceKey", selection.resourceKey);
        }
        window.location.replace(redirectUrl.toString());
      }

      function cancelSelection(request) {
        const redirectUrl = new URL(request.payload.localRedirect);
        redirectUrl.searchParams.set("state", request.rawRequest);
        redirectUrl.searchParams.set("cancelled", "1");
        window.location.replace(redirectUrl.toString());
      }

      function failSelection(request, error) {
        const redirectUrl = new URL(request.payload.localRedirect);
        redirectUrl.searchParams.set("state", request.rawRequest);
        redirectUrl.searchParams.set("error", error.message || String(error));
        window.location.replace(redirectUrl.toString());
      }

      function requestGoogleToken(googleWebClientId) {
        return new Promise((resolve, reject) => {
          const request = parseRequest();
          const tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: googleWebClientId,
            scope: DRIVE_READONLY_SCOPE,
            prompt: "",
            login_hint: request.payload.loginHint || undefined,
            callback: (response) => {
              if (response.error) {
                reject(new Error(response.error));
                return;
              }
              resolve(response);
            },
            error_callback: (error) => reject(new Error(error.type || "Google token request failed"))
          });
          tokenClient.requestAccessToken();
        });
      }

      function loadPickerApi() {
        return new Promise((resolve) => {
          window.gapi.load("picker", resolve);
        });
      }

      function waitForGoogleIdentity() {
        return new Promise((resolve, reject) => {
          let attempts = 0;
          const timer = window.setInterval(() => {
            if (window.google && google.accounts && google.accounts.oauth2) {
              window.clearInterval(timer);
              resolve();
              return;
            }

            attempts += 1;
            if (attempts > 100) {
              window.clearInterval(timer);
              reject(new Error("Google Identity Services did not finish loading."));
            }
          }, 100);
        });
      }

      async function tryHintLookup(request, accessToken) {
        if (!request.payload.hintFileId) {
          return null;
        }

        setHint(`Trying the pasted file first: ${request.payload.hintFileId}`);
        const url = new URL(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(request.payload.hintFileId)}`);
        url.searchParams.set("fields", "id,name,mimeType,webViewLink,resourceKey");
        url.searchParams.set("supportsAllDrives", "true");
        if (request.payload.resourceKey) {
          url.searchParams.set("resourceKey", request.payload.resourceKey);
        }

        const response = await fetch(url.toString(), {
          headers: {
            Authorization: `Bearer ${accessToken}`
          }
        });
        if (!response.ok) {
          return null;
        }

        const payload = await response.json();
        if (!request.payload.supportedMimeTypes.includes(payload.mimeType)) {
          throw new Error(`The pasted file is not a ${request.payload.sourceTypeLabel}.`);
        }

        return {
          fileId: payload.id,
          title: payload.name,
          sourceUrl: payload.webViewLink || "",
          sourceMimeType: payload.mimeType,
          resourceKey: payload.resourceKey || request.payload.resourceKey
        };
      }

      function openPicker(config, request, accessToken) {
        const viewId = google.picker.ViewId[request.payload.pickerViewId] || google.picker.ViewId.DOCUMENTS;
        const docsView = new google.picker.DocsView(viewId)
          .setIncludeFolders(false)
          .setSelectFolderEnabled(false)
          .setMimeTypes(request.payload.pickerMimeTypes);

        if (request.payload.hintFileId) {
          docsView.setFileIds(request.payload.hintFileId);
        }

        const picker = new google.picker.PickerBuilder()
          .setDeveloperKey(config.googleApiKey)
          .setAppId(String(config.googleProjectNumber))
          .setOAuthToken(accessToken)
          .addView(docsView)
          .setCallback((data) => {
            const action = data.action;
            if (action === google.picker.Action.CANCEL) {
              cancelSelection(request);
              return;
            }

            if (action === google.picker.Action.PICKED) {
              const doc = data.docs[0];
              completeSelection(request, {
                fileId: doc.id,
                title: doc.name || doc.title || request.payload.sourceTypeLabel,
                sourceUrl: doc.url || "",
                sourceMimeType: doc.mimeType || request.payload.supportedMimeTypes[0] || "",
                resourceKey: doc.resourceKey
              });
            }
          })
          .build();

        picker.setVisible(true);
      }

      async function startPickerFlow(request, config) {
        setStatus("Requesting Google access…");
        const tokenResponse = await requestGoogleToken(config.googleWebClientId);
        const accessToken = tokenResponse.access_token;

        const hintedSelection = await tryHintLookup(request, accessToken);
        if (hintedSelection) {
          completeSelection(request, hintedSelection);
          return;
        }

        setHint(
          request.payload.hintFileId
            ? `Google still needs a one-time Picker confirmation for that file: ${request.payload.hintFileId}`
            : ""
        );
        setStatus("Opening Google Picker…");
        await loadPickerApi();
        openPicker(config, request, accessToken);
      }

      function showRetryButton(request, config) {
        setContinueButtonState({
          hidden: false,
          disabled: false,
          label: "Try Again",
          onClick: () => {
            setContinueButtonState({
              hidden: false,
              disabled: true,
              label: "Opening Google Picker…"
            });
            void startPickerFlow(request, config).catch((error) => {
              console.error(error);
              setStatus(error.message || "Google Picker failed.");
              showRetryButton(request, config);
            });
          }
        });
      }

      async function main() {
        const request = parseRequest();
        const config = validateSiteConfig();
        setHeading(`Select a ${request.payload.sourceTypeLabel}`);
        setStatus("Waiting for Google libraries…");
        await waitForGoogleIdentity();
        setStatus(`Continue to choose a ${request.payload.sourceTypeLabel}.`);
        setContinueButtonState({
          hidden: false,
          disabled: false,
          label: "Continue with Google",
          onClick: () => {
            setContinueButtonState({
              hidden: false,
              disabled: true,
              label: "Opening Google Picker…"
            });
            void startPickerFlow(request, config).catch((error) => {
              console.error(error);
              setStatus(error.message || "Google Picker failed.");
              showRetryButton(request, config);
            });
          }
        });
      }

      window.addEventListener("load", () => {
        main().catch((error) => {
          console.error(error);
          setStatus(error.message || "Google Picker failed.");
          try {
            const request = parseRequest();
            failSelection(request, error);
          } catch (nestedError) {
            console.error(nestedError);
          }
        });
      });
    </script>
  </body>
</html>
